name: Feature Request
description: Suggest an improvement or new capability
labels: ["enhancement"]
body:
  - type: textarea
    id: motivation
    attributes:
      label: Problem or motivation
      description: What problem does this solve, or what would it improve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe what you'd like to happen.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternatives you've tried.
    validations:
      required: false

  - type: dropdown
    id: plugin
    attributes:
      label: Plugin scope
      options:
        - Persnoop (build tool)
        - Persnipe (command)
        - Both
        - Not specific to a plugin
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
    validations:
      required: false
