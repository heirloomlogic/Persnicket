name: Bug Report
description: Report a bug in Persnicket
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Package.swift target configuration
        2. Command or build action that triggered the issue
        3. Error output or unexpected behavior
    validations:
      required: true

  - type: dropdown
    id: plugin
    attributes:
      label: Plugin
      options:
        - Persnoop (build tool)
        - Persnipe (command)
        - Both / Not sure
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS
        - Linux
        - Windows
    validations:
      required: true

  - type: input
    id: swift-version
    attributes:
      label: Swift version
      placeholder: "e.g., 6.0.3"
    validations:
      required: true

  - type: input
    id: xcode-version
    attributes:
      label: Xcode version (macOS only)
      placeholder: "e.g., 16.2"
    validations:
      required: false

  - type: textarea
    id: config
    attributes:
      label: ".swift-format configuration"
      description: Paste your `.swift-format` file contents, if relevant.
      render: json
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Logs, screenshots, or anything else that might help.
    validations:
      required: false
